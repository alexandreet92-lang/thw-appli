  <!-- Theme controller — applied before first paint to avoid any flash -->
  <script>
    window.THWTheme = (function () {
      var KEY = 'thw-theme-mode';
      var listeners = [];
      function getMode() { try { return localStorage.getItem(KEY) || 'auto'; } catch (e) { return 'auto'; } }
      function resolve(mode) {
        if (mode === 'light') return 'light';
        if (mode === 'dark') return 'dark';
        var h = new Date().getHours();
        return (h >= 7 && h < 20) ? 'light' : 'dark';
      }
      function apply(mode) {
        var eff = resolve(mode);
        var el = document.documentElement;
        el.classList.toggle('light', eff === 'light');
        el.classList.toggle('dark', eff === 'dark');
        for (var i = 0; i < listeners.length; i++) { try { listeners[i](mode, eff); } catch (e) {} }
      }
      function setMode(mode) { try { localStorage.setItem(KEY, mode); } catch (e) {} apply(mode); }
      function onChange(fn) { listeners.push(fn); return function () { listeners = listeners.filter(function (f) { return f !== fn; }); }; }
      apply(getMode());
      setInterval(function () { if (getMode() === 'auto') apply('auto'); }, 60000);
      return { getMode: getMode, setMode: setMode, resolve: resolve, apply: apply, onChange: onChange, effective: function () { return resolve(getMode()); } };
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; font-family: var(--font-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; transition: background 0.4s ease, color 0.4s ease; }

    /* Solid card surface — theme-aware (used for featured/highlighted gradient ends) */
    :root { --card-solid: #070b0f; }

    a { color: var(--brand); }

        radial-gradient(ellipse 60% 60% at 85% 80%, rgba(91,111,255,0.09) 0%, transparent 60%),

    .grid-bg {

      background-image:
        linear-gradient(rgba(127,127,127,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(127,127,127,0.05) 1px, transparent 1px);

      mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, black 10%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, black 10%, transparent 70%);
    }
    #root { position: relative; z-index: 1; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    @keyframes proGlow { 0%,100% { box-shadow: 0 0 30px rgba(0,200,224,0.18), 0 0 60px rgba(91,111,255,0.10); } 50% { box-shadow: 0 0 50px rgba(0,200,224,0.32), 0 0 100px rgba(91,111,255,0.18); } }
    @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(0,200,224,0.45); } 50% { box-shadow: 0 0 0 10px rgba(0,200,224,0); } }

    @media (max-width: 960px) { .cards-grid { grid-template-columns: 1fr !important; max-width: 520px !important; } }
    @media (max-width: 600px) {
      .page-pad { padding-left: 16px !important; padding-right: 16px !important; }
      .settings-bar { top: 10px !important; right: 10px !important; transform: scale(0.9); transform-origin: top right; }
    }
  </style>
</head>

    function PageMenu() {
      const [open, setOpen] = React.useState(false);
      const ref = React.useRef(null);
      React.useEffect(() => {
        function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
        function onKey(e) { if (e.key === 'Escape') setOpen(false); }
        document.addEventListener('mousedown', onDoc);
        document.addEventListener('keydown', onKey);
        return () => { document.removeEventListener('mousedown', onDoc); document.removeEventListener('keydown', onKey); };

        <div ref={ref} style={{ position: 'relative' }}>

            display: 'inline-flex', alignItems: 'center', gap: 7, cursor: 'pointer',

    // ── Language switcher (FR / EN / ES) — sits in the shared header ─────────────
    function LangSwitcher({ lang, setLang }) {
      const langs = [['fr', 'FR'], ['en', 'EN'], ['es', 'ES']];
      return (
        <div role="group" aria-label="Langue" style={{
          display: 'inline-flex', alignItems: 'center', gap: 2, padding: 3,
          borderRadius: 999, background: 'var(--bg-card)',
          border: '1px solid var(--border-mid)', boxShadow: 'var(--shadow-card)',
        }}>
          {langs.map(([v, label]) => {
            const active = lang === v;
            return (
              <button key={v} type="button" onClick={() => setLang(v)} aria-pressed={active} style={{
                padding: '6px 11px', borderRadius: 999, border: 'none', cursor: 'pointer',
                background: active ? 'var(--brand-gradient)' : 'transparent',
                color: active ? '#fff' : 'var(--text-mid)',
                fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: active ? 700 : 500,
                lineHeight: 1, letterSpacing: '0.02em',
                boxShadow: active ? '0 2px 10px rgba(0,200,224,0.30)' : 'none',
                transition: 'color 0.18s, background 0.18s',
              }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.color = 'var(--text)'; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.color = 'var(--text-mid)'; }}>
                {label}
              </button>
            );
          })}
        </div>
      );

          {[
            { v: 'monthly', label: T.monthly },
            { v: 'annual',  label: T.annual  },
          ].map(({ v, label }) => {
            const active = value === v;
            return (
              <button key={v} onClick={() => onChange(v)} style={{
                display: 'flex', alignItems: 'center', gap: 8,
                padding: '9px 20px', borderRadius: 999, border: 'none',
                background: active ? 'var(--bg-hover)' : 'transparent',
                color: active ? 'var(--text)' : 'var(--text-dim)',
                fontFamily: "'DM Sans', sans-serif",
                fontSize: 13, fontWeight: active ? 600 : 400,
                cursor: 'pointer', transition: 'all 0.2s', whiteSpace: 'nowrap',
              }}>
                {label}
                {v === 'annual' && (
                  <span style={{
                    padding: '3px 9px', borderRadius: 999,
                    background: 'linear-gradient(135deg, #00c8e0, #5b6fff)',
                    color: '#fff', fontSize: 10, fontWeight: 700,
                    letterSpacing: '0.04em',
                  }}>{T.save}</span>
                )}
              </button>
            );
          })}
        </div>
      );
    }

    // ── PlanCard ─────────────────────────────────────────────────────────────
    function PlanCard({ plan, billing, flipping, delay, highlighted, T, eff }) {
      const isAnnual  = billing === 'annual';
      const monthly   = isAnnual ? Math.round(plan.price.annual / 12) : plan.price.monthly;
      const { accent, accentB, featured } = plan;
      const aText = eff === 'light' ? plan.accentDeep : accent;

      const cardInner = (
        <div style={{
          background: featured
            ? `linear-gradient(180deg, rgba(0,200,224,0.055) 0%, var(--card-solid) 36%)`
            : highlighted
              ? `linear-gradient(180deg, ${plan.accent}0d 0%, var(--card-solid) 36%)`
              : 'var(--bg-card-2)',
          borderRadius: featured ? 19 : 15,
          outline: highlighted && !featured ? `2px solid ${plan.accent}55` : 'none',
          padding: '26px 26px 22px',
          height: '100%', display: 'flex', flexDirection: 'column',
          position: 'relative', overflow: 'hidden',
          animation: `fadeUp 0.65s ${delay}s cubic-bezier(0.4,0,0.2,1) both`,
        }}>

          {/* Top accent bar */}
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0,
            height: featured ? 3 : 2,
            background: featured
              ? `linear-gradient(90deg, ${accent}, ${accentB})`
              : `linear-gradient(90deg, ${accent}70, transparent 60%)`,
          }}/>

          {/* Popular badge */}
          {featured && (
            <div style={{
              position: 'absolute', top: 14, right: 14,
              padding: '4px 11px', borderRadius: 999,
              background: 'linear-gradient(135deg, #00c8e0, #5b6fff)',
              fontFamily: "'DM Sans', sans-serif", fontSize: 10,
              fontWeight: 700, letterSpacing: '0.05em',
              textTransform: 'uppercase', color: '#fff',
              boxShadow: '0 2px 14px rgba(0,200,224,0.38)',
            }}>{T.popular}</div>
          )}

          {/* AI identity */}
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 9,
            padding: '7px 12px', borderRadius: 10,
            background: `${accent}10`, border: `1px solid ${accent}28`,
            marginBottom: 18, alignSelf: 'flex-start',
          }}>
            <div style={{
              width: 26, height: 26, borderRadius: 7, flexShrink: 0,
              background: `${accent}1a`, border: `1px solid ${accent}38`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: "'DM Mono', monospace", fontSize: 13, fontWeight: 500, color: aText,
            }}>{plan.ai.glyph}</div>
            <div>
              <div style={{
                fontFamily: "'DM Mono', monospace", fontSize: 10,
                fontWeight: 600, color: aText,
                letterSpacing: '0.1em', textTransform: 'uppercase', lineHeight: 1,
              }}>{plan.ai.name}</div>
              <div style={{
                fontFamily: "'DM Sans', sans-serif", fontSize: 10,
                color: 'var(--text-dim)', marginTop: 3, lineHeight: 1,
              }}>{plan.ai.model}{plan.ai.sub ? ` · ${plan.ai.sub}` : ''}</div>
            </div>
          </div>

          {/* Plan name */}
          <div style={{
            fontFamily: "'Syne', sans-serif", fontSize: 24,
            fontWeight: 800, letterSpacing: '-0.04em', color: 'var(--text)', marginBottom: 18,
          }}>{plan.name}</div>

          {/* Price */}
          <div style={{
            marginBottom: 20,
            opacity: flipping ? 0 : 1,
            transform: flipping ? 'translateY(-10px)' : 'translateY(0)',
            transition: 'opacity 0.14s ease, transform 0.14s ease',
          }}>
            <div style={{ display: 'flex', alignItems: 'flex-end', gap: 3 }}>
              <span style={{
                fontFamily: "'DM Sans', sans-serif", fontSize: 18,
                fontWeight: 600, color: 'var(--text-mid)', marginBottom: 9,
              }}>€</span>
              <span style={{
                fontFamily: "'Syne', sans-serif", fontSize: 52,
                fontWeight: 800, letterSpacing: '-0.06em', lineHeight: 1,
                color: 'var(--text)',
              }}>{monthly}</span>
              <span style={{
                fontFamily: "'DM Mono', monospace", fontSize: 11,
                color: 'var(--text-dim)', marginBottom: 10, paddingLeft: 2,
              }}>{T.perMonth}</span>
            </div>
            <div style={{
              fontFamily: "'DM Sans', sans-serif", fontSize: 11,
              color: 'var(--text-dim)', marginTop: 4,
            }}>
              {isAnnual ? T.billedAnnual(plan.price.annual) : T.billedMonthly}
            </div>
          </div>

          {/* Divider */}
          <div style={{
            height: 1, marginBottom: 14,
            background: `linear-gradient(90deg, ${accent}22, transparent 70%)`,
          }}/>

          {/* Features */}
          <div style={{ flex: 1, marginBottom: 20 }}>
            {plan.features.map((f, i) => (
              <div key={i} style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
                padding: '8px 0', gap: 12,
                borderBottom: i < plan.features.length - 1 ? '1px solid var(--border)' : 'none',
              }}>
                <span style={{
                  fontFamily: "'DM Sans', sans-serif", fontSize: 12,
                  color: 'var(--text-dim)', flexShrink: 0, lineHeight: 1.4,
                }}>{f.l}</span>
                <div style={{ textAlign: 'right' }}>
                  <div style={{
                    fontFamily: "'DM Mono', monospace", fontSize: 12,
                    fontWeight: 500, color: aText, lineHeight: 1.3,
                  }}>{f.v}</div>
                  {f.s && <div style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 10,
                    color: 'var(--text-dim)', marginTop: 2,
                  }}>{f.s}</div>}
                </div>
              </div>
            ))}
          </div>

          {/* CTA */}
          <a href={billing === 'annual' ? plan.stripe.annual : plan.stripe.monthly}
            style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              padding: '13px 20px', borderRadius: 12, textDecoration: 'none',
              background: featured
                ? `linear-gradient(135deg, ${accent}, ${accentB})`
                : `${accent}14`,
              border: featured ? 'none' : `1px solid ${accent}28`,
              color: featured ? '#fff' : aText,
              fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600,
              letterSpacing: '-0.01em', cursor: 'pointer',
              boxShadow: featured ? `0 4px 22px ${accent}40` : 'none',
              transition: 'all 0.18s',
            }}
            onMouseEnter={e => {
              e.currentTarget.style.filter = 'brightness(1.09)';
              e.currentTarget.style.transform = 'translateY(-1px)';
            }}
            onMouseLeave={e => {
              e.currentTarget.style.filter = '';
              e.currentTarget.style.transform = '';
            }}
          >
            {T.subscribe}
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2">
              <path d="M5 12h14M13 5l7 7-7 7"/>
            </svg>
          </a>
          <div style={{
            textAlign: 'center', marginTop: 10,
            fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: 'var(--text-dim)',
          }}>{T.ctaNote}</div>
        </div>
      );

      // Featured: gradient border wrapper + glow
      if (featured) {
        return (
          <div style={{
            background: `linear-gradient(145deg, ${accent}, ${accentB})`,
            borderRadius: 20, padding: 1,
            animation: `proGlow 4s ease-in-out infinite`,
            alignSelf: 'stretch',
          }}>
            {cardInner}
          </div>
        );
      }

      return (
        <div style={{
          border: '1px solid var(--border)',
          borderRadius: 16, overflow: 'hidden', alignSelf: 'stretch',
        }}>
          {cardInner}
        </div>
      );
    }

    // ── FAQItem ───────────────────────────────────────────────────────────────
    function FAQItem({ item }) {
      const [open, setOpen] = React.useState(false);
      return (
        <div style={{ borderBottom: '1px solid var(--border)' }}>
          <button onClick={() => setOpen(o => !o)} style={{
            width: '100%', display: 'flex', justifyContent: 'space-between',
            alignItems: 'center', padding: '20px 0',
            background: 'none', border: 'none', cursor: 'pointer', gap: 16, textAlign: 'left',
          }}>
            <span style={{
              fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 500,
              color: open ? 'var(--text)' : 'var(--text-mid)', lineHeight: 1.5,
              transition: 'color 0.15s',
            }}>{item.q}</span>
            <div style={{
              width: 26, height: 26, flexShrink: 0, borderRadius: '50%',
              background: open ? 'linear-gradient(135deg,#00c8e0,#5b6fff)' : 'var(--bg-hover)',
              border: open ? 'none' : '1px solid var(--border-mid)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              transform: open ? 'rotate(45deg)' : 'none',
              transition: 'all 0.22s cubic-bezier(0.4,0,0.2,1)',
            }}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={open ? 'white' : 'currentColor'} strokeWidth="3.5" style={{ color: 'var(--text-mid)' }}>
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </div>
          </button>
          <div style={{
            maxHeight: open ? 220 : 0, overflow: 'hidden',
            transition: 'max-height 0.32s cubic-bezier(0.4,0,0.2,1)',
          }}>
            <p style={{
              fontFamily: "'DM Sans', sans-serif", fontSize: 13,
              color: 'var(--text-mid)', lineHeight: 1.72,
              paddingBottom: 22, margin: 0,
            }}>{item.a}</p>
          </div>
        </div>
      );
    }

    // ── Theme helpers ─────────────────────────────────────────────────────────
    function resolveAuto() {
      const h = new Date().getHours();
      return (h >= 7 && h < 20) ? 'light' : 'dark';
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const params  = new URLSearchParams(window.location.search);
      const defaultBilling = params.get('billing') === 'annual' ? 'annual' : 'monthly';
      const highlightPlan  = params.get('plan') || null;
      const [billing,  setBilling]  = React.useState(defaultBilling);
      const [flipping, setFlipping] = React.useState(false);

      // Language
      const [lang, setLang] = React.useState(() => localStorage.getItem('thw_lang') || 'fr');
      const T = I18N[lang];
      React.useEffect(() => {
        localStorage.setItem('thw_lang', lang);
        document.documentElement.lang = lang;
        document.title = T.title;
      }, [lang]);

      // Theme — driven by shared window.THWTheme (Jour/Nuit/Auto in the header).
      // `eff` (light|dark) only feeds accent-color choices in the cards.
      const [eff, setEff] = React.useState(() => (window.THWTheme ? window.THWTheme.effective() : 'dark'));
      React.useEffect(() => {
        if (!window.THWTheme) return undefined;
        setEff(window.THWTheme.effective());
        return window.THWTheme.onChange(() => setEff(window.THWTheme.effective()));
      }, []);

      const PLANS = React.useMemo(() => buildPlans(lang), [lang]);

      function handleBilling(v) {
        if (v === billing) return;
        setFlipping(true);
        setTimeout(() => { setBilling(v); setFlipping(false); }, 160);
      }

      return (
        <div style={{ minHeight: '100vh' }}>

          {/* ── Header auto-suffisant (logo + langue) ── */}
          <header style={{
            position: 'sticky', top: 0, zIndex: 100,
            backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)',
            background: 'var(--nav-bg)', borderBottom: '1px solid var(--nav-border)',
          }}>
            <div style={{
              maxWidth: 1180, margin: '0 auto', padding: '14px 24px',
              display: 'flex', alignItems: 'center', gap: 16,
            }}>
              <a href="/" style={{ display: 'inline-flex', alignItems: 'center', gap: 10, textDecoration: 'none' }}>
                <img src="/logo.png" alt="THW" width="30" height="30" style={{ borderRadius: 8, display: 'block' }}/>
                <span style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 18, letterSpacing: '-0.04em', color: 'var(--text)' }}>
                  THW <span style={{ color: 'var(--brand)' }}>Coaching</span>
                </span>
              </a>
              <div style={{ marginLeft: 'auto' }}>
                <LangSwitcher lang={lang} setLang={setLang} />
              </div>
            </div>
          </header>

          {/* ── Header ── */}
          <div className="page-pad" style={{ textAlign: 'center', padding: '64px 24px 52px', maxWidth: 860, margin: '0 auto' }}>
            {/* Pill label */}
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 8,
              padding: '5px 14px', borderRadius: 999, marginBottom: 22,
              border: '1px solid rgba(0,200,224,0.22)',
              background: 'rgba(0,200,224,0.06)',
              animation: 'fadeUp 0.5s cubic-bezier(0.4,0,0.2,1) both',
            }}>
              <span style={{
                width: 6, height: 6, borderRadius: '50%',
                background: '#00c8e0', display: 'inline-block',
                animation: 'pulse-dot 2s infinite',
              }}/>
              <span style={{
                fontFamily: "'DM Mono', monospace", fontSize: 10,
                color: '#00c8e0', letterSpacing: '0.14em', textTransform: 'uppercase',
              }}>{T.pill}</span>
            </div>

            {/* Title */}
            <h1 style={{
              fontFamily: "'Syne', sans-serif",
              fontSize: 'clamp(38px, 6vw, 68px)',
              fontWeight: 800, letterSpacing: '-0.055em', lineHeight: 1.0,
              margin: '0 0 16px', textWrap: 'balance',
              animation: 'fadeUp 0.6s 0.06s cubic-bezier(0.4,0,0.2,1) both',
            }}>
              {T.titleLead}{' '}
              <span style={{
                background: 'linear-gradient(135deg, #00c8e0 20%, #5b6fff 80%)',
                WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text',
              }}>{T.titleAccent}</span>
            </h1>

            {/* Toggle */}
            <div style={{ animation: 'fadeUp 0.6s 0.18s cubic-bezier(0.4,0,0.2,1) both' }}>
              <BillingToggle value={billing} onChange={handleBilling} T={T} />
            </div>
          </div>

          {/* ── Cards ── */}
          <div className="page-pad" style={{ padding: '0 24px 90px', maxWidth: 1160, margin: '0 auto' }}>
            <div className="cards-grid" style={{
              display: 'grid', gridTemplateColumns: '1fr 1.05fr 1fr',
              gap: 14, alignItems: 'stretch', margin: '0 auto',
            }}>
              {PLANS.map((plan, i) => (
                <PlanCard
                  key={plan.id} plan={plan}
                  billing={billing} flipping={flipping}
                  delay={0.12 + i * 0.09}
                  highlighted={highlightPlan === plan.id}
                  T={T} eff={eff}
                />
              ))}
            </div>

            {/* Trust strip */}
            <div style={{
              display: 'flex', justifyContent: 'center', gap: 28,
              marginTop: 36, flexWrap: 'wrap',
            }}>
              {T.trust.map((label, i) => {
                const Icon = TRUST_ICONS[i];
                return (
                  <div key={i} style={{
                    display: 'flex', alignItems: 'center', gap: 8,
                    fontFamily: "'DM Sans', sans-serif", fontSize: 12,
                    color: 'var(--text-dim)',
                  }}>
                    <span style={{ color: 'var(--brand)', display: 'inline-flex' }}><Icon/></span>{label}
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── FAQ ── */}
          <div className="page-pad" style={{ maxWidth: 700, margin: '0 auto', padding: '0 24px 90px' }}>
            <div style={{ textAlign: 'center', marginBottom: 36 }}>
              <div style={{
                fontFamily: "'DM Mono', monospace", fontSize: 10,
                color: '#00c8e0', letterSpacing: '0.14em',
                textTransform: 'uppercase', marginBottom: 12,
              }}>{T.faqLabel}</div>
              <h2 style={{
                fontFamily: "'Syne', sans-serif",
                fontSize: 'clamp(26px, 4vw, 38px)',
                fontWeight: 800, letterSpacing: '-0.04em', margin: 0,
              }}>{T.faqTitle}</h2>
            </div>
            <div style={{
              background: 'var(--bg-card-2)',
              border: '1px solid var(--border)',
              borderRadius: 16, padding: '0 26px',
            }}>
              {T.faq.map((item, i) => <FAQItem key={lang + i} item={item} />)}
            </div>
          </div>

          {/* ── Footer ── */}
          <div style={{
            borderTop: '1px solid var(--border)',
            padding: '22px 24px 28px', textAlign: 'center',
          }}>
            <div style={{
              display: 'flex', justifyContent: 'center', gap: 24,
              flexWrap: 'wrap', marginBottom: 12,
            }}>
              {T.footerLinks.map((l, i) => (
                <a key={i} href="#" style={{
                  fontFamily: "'DM Sans', sans-serif", fontSize: 12,
                  color: 'var(--text-dim)', textDecoration: 'none', transition: 'color 0.15s',
                }}
                onMouseEnter={e => e.currentTarget.style.color = '#00c8e0'}
                onMouseLeave={e => e.currentTarget.style.color = 'var(--text-dim)'}
                >{l}</a>
              ))}
            </div>
            <div style={{
              fontFamily: "'DM Mono', monospace", fontSize: 11, color: 'var(--text-dim)',
            }}>© 2026 THW Coaching</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
