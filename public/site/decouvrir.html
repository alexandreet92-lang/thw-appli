<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Découvrir — THW Coaching</title>
  <meta name="description" content="Tout ce que l'app THW Coaching sait faire : 16 piliers, du coach IA personnalisé à l'analyse de tes performances. Ton entraînement hybride, piloté par une IA qui te connaît."/>
  <link rel="icon" href="assets/logo.png"/>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <link rel="stylesheet" href="site.css"/>

  <!-- Theme controller — applied before first paint to avoid any flash -->
  <script>
    window.THWTheme = (function () {
      var KEY = 'thw-theme-mode';
      var listeners = [];
      function getMode() { try { return localStorage.getItem(KEY) || 'dark'; } catch (e) { return 'dark'; } }
      function resolve(mode) {
        if (mode === 'light') return 'light';
        if (mode === 'dark') return 'dark';
        var h = new Date().getHours();
        return (h >= 7 && h < 20) ? 'light' : 'dark';
      }
      function apply(mode) {
        var eff = resolve(mode);
        var el = document.documentElement;
        el.classList.toggle('light', eff === 'light');
        el.classList.toggle('dark', eff === 'dark');
        for (var i = 0; i < listeners.length; i++) { try { listeners[i](mode, eff); } catch (e) {} }
      }
      function setMode(mode) { try { localStorage.setItem(KEY, mode); } catch (e) {} apply(mode); }
      function onChange(fn) { listeners.push(fn); return function () { listeners = listeners.filter(function (f) { return f !== fn; }); }; }
      apply(getMode());
      setInterval(function () { if (getMode() === 'auto') apply('auto'); }, 60000);
      return { getMode: getMode, setMode: setMode, resolve: resolve, apply: apply, onChange: onChange, effective: function () { return resolve(getMode()); } };
    })();
  </script>
</head>
<body>
  <div class="atmosphere"></div>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="vendor/react.development.js"></script>
  <script src="vendor/react-dom.development.js"></script>

  <!-- Content data (plain JS) -->

  <!-- Components -->
  <script type="text/babel" src="components/branding/ThwLogo.jsx"></script>
  <script type="text/babel" src="components/branding/ThemeToggle.jsx"></script>
  <script type="text/babel" src="components/site/Icons.jsx"></script>
  <script type="text/babel" src="components/site/SiteChrome.jsx"></script>
  <script type="text/babel" src="components/site/Mockups.jsx"></script>
  <script type="text/babel" src="components/site/Discover.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<Discover/>);
  </script>

  <!-- i18n — FR (source) / EN / ES runtime translation + switcher -->
